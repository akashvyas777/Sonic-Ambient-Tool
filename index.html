<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SonicTool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <header><div class="status-bar"><span>Active</span><button id="freeze-btn" style="background:none; border:none; color:white;"><i data-lucide="pause"></i></button></div></header>
        <main>
            <section id="view-tune" class="view active">
                <div class="pitch-display"><h1 id="note-name">--</h1><div id="frequency">0.0 Hz</div></div>
                <div class="tuner-container">
                    <div class="tuner-scale"><span>-50</span><span>0</span><span>+50</span></div>
                    <div class="center-line"></div>
                    <div id="tuner-needle"></div>
                </div>
            </section>
            <section id="view-analyze" class="view"><div class="full-spectrogram-container"><canvas id="history-canvas"></canvas></div></section>
            <section id="view-practice" class="view">
                <div class="card"><h3>Metronome</h3><div id="bpm-value" style="font-size:2rem; font-weight:bold;">120</div><input type="range" id="bpm-slider" min="40" max="220" value="120" style="width:100%;"><button id="metro-toggle" class="btn-primary" style="margin-top:10px;">Start</button></div>
                <div class="card"><h3>Drone</h3><div class="drone-grid"><button class="drone-note" data-note="C">C</button><button class="drone-note" data-note="C#">C#</button><button class="drone-note" data-note="D">D</button><button class="drone-note" data-note="G">G</button></div><button id="drone-toggle" class="btn-primary">Play Drone</button></div>
            </section>
            <section id="view-settings" class="view"><div class="card">A4 Calibration: 440Hz</div></section>
        </main>
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="tune"><i data-lucide="music"></i><span>Tune</span></button>
            <button class="nav-item" data-view="analyze"><i data-lucide="activity"></i><span>Analyze</span></button>
            <button class="nav-item" data-view="practice"><i data-lucide="mic-2"></i><span>Practice</span></button>
            <button class="nav-item" data-view="settings"><i data-lucide="settings"></i><span>Settings</span></button>
        </nav>
    </div>
    <div id="modal-permission" class="modal"><button id="start-app-btn" class="btn-primary" style="width:200px;">Start Engine</button></div>
    <script src="script.js"></script><script>lucide.createIcons();</script>
</body>
</html>
