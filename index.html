<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PitchPro MVP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">
    <div id="app">
        <header>
            <div class="status-bar">
                <span id="connection-status">Ready</span>
                <button id="freeze-btn" class="icon-btn"><i data-lucide="pause"></i></button>
            </div>
        </header>

        <main id="view-container">
            <section id="view-tune" class="view active">
                <div class="pitch-display">
                    <div class="note-info">
                        <h1 id="note-name">--</h1>
                        <span id="note-octave"></span>
                    </div>
                    <div class="hz-display"><span id="frequency">0.0</span> Hz</div>
                </div>

                <div class="tuner-container">
                    <div class="tuner-scale">
                        <span>-50</span>
                        <span>0</span>
                        <span>+50</span>
                    </div>
                    <div class="center-line"></div>
                    <div id="tuner-needle"></div>
                </div>
                <p class="label-desc">CENTS</p>
            </section>

            <section id="view-analyze" class="view">
                <div class="card">
                    <h3>Pitch Histogram</h3>
                    <div class="canvas-wrapper">
                        <canvas id="history-canvas"></canvas>
                    </div>
                    <p class="label-desc">Real-time Pitch Tracking</p>
                </div>
            </section>

            <section id="view-practice" class="view">
                <div class="card">
                    <h3>Metronome</h3>
                    <div class="tempo-display">
                        <span id="bpm-value">120</span> <small>BPM</small>
                    </div>
                    <input type="range" id="bpm-slider" min="40" max="220" value="120">
                    <button id="metro-toggle" class="btn-primary">Start</button>
                </div>
                <div class="card">
                    <h3>Vocal Range</h3>
                    <div class="range-grid">
                        <div><p>LOW</p><span id="range-low">--</span></div>
                        <div><p>HIGH</p><span id="range-high">--</span></div>
                    </div>
                    <button id="reset-range" class="btn-secondary">Reset</button>
                </div>
            </section>

            <section id="view-settings" class="view">
                <div class="card">
                    <div class="settings-group">
                        <label>Notation</label>
                        <select id="setting-notation">
                            <option value="english">Standard (A, B, C)</option>
                            <option value="solfege">Solfege (Do, Re, Mi)</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label>Ref Pitch (A4)</label>
                        <input type="number" id="setting-ref-pitch" value="440">
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-view="tune"><i data-lucide="music"></i><span>Tune</span></button>
            <button class="nav-item" data-view="analyze"><i data-lucide="activity"></i><span>Analyze</span></button>
            <button class="nav-item" data-view="practice"><i data-lucide="mic-2"></i><span>Practice</span></button>
            <button class="nav-item" data-view="settings"><i data-lucide="settings"></i><span>Settings</span></button>
        </nav>
    </div>

    <div id="modal-permission" class="modal">
        <div class="modal-content">
            <h2>Microphone Access</h2>
            <p>We need your mic to analyze pitch.</p>
            <button id="start-app-btn" class="btn-primary">Enable Microphone</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
