<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PitchPro - Professional Tuner & Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">
    <div id="app">
        <header>
            <div class="status-bar">
                <span id="connection-status">System Ready</span>
                <button id="freeze-btn" class="icon-btn"><i data-lucide="pause"></i></button>
            </div>
        </header>

        <main id="view-container">
            <section id="view-tune" class="view active">
                <div class="pitch-display">
                    <div class="note-info">
                        <h1 id="note-name">--</h1>
                        <span id="note-octave"></span>
                    </div>
                    <div class="hz-display"><span id="frequency">0.0</span> Hz</div>
                </div>

                <div class="tuner-container">
                    <div class="tuner-scale">
                        <span>-50</span>
                        <span>0</span>
                        <span>+50</span>
                    </div>
                    <div class="center-line"></div>
                    <div id="tuner-needle"></div>
                </div>
                <p class="label-desc">CENTS DEVIATION</p>
            </section>

            <section id="view-analyze" class="view">
                <div class="card">
                    <h3>Pitch vs Notation</h3>
                    <div class="canvas-wrapper">
                        <canvas id="history-canvas"></canvas>
                    </div>
                    <p class="label-desc">Real-time Vocal Tracking</p>
                </div>
            </section>

            <section id="view-practice" class="view">
                <div class="card">
                    <h3>Metronome</h3>
                    <div class="tempo-display">
                        <span id="bpm-value">120</span> <small>BPM</small>
                    </div>
                    <input type="range" id="bpm-slider" min="40" max="220" value="120">
                    <button id="metro-toggle" class="btn-primary" style="margin-top:15px;">Start Metronome</button>
                </div>
                <div class="card">
                    <h3>Vocal Range</h3>
                    <div class="range-grid">
                        <div><p class="label-desc">LOWEST</p><span id="range-low">--</span></div>
                        <div><p class="label-desc">HIGHEST</p><span id="range-high">--</span></div>
                    </div>
                    <button id="reset-range" class="btn-secondary">Reset Tracking</button>
                </div>
            </section>

            <section id="view-settings" class="view">
                <div class="card">
                    <div class="settings-group">
                        <label>Notation System</label>
                        <select id="setting-notation">
                            <option value="english">C D E F G A B</option>
                            <option value="solfege">Do Re Mi Fa Sol La Si</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label>Reference Pitch (A4)</label>
                        <input type="number" id="setting-ref-pitch" value="440" step="1">
                    </div>
                    <div class="settings-group">
                        <label>Noise Threshold</label>
                        <input type="range" id="setting-threshold" min="0.005" max="0.05" step="0.005" value="0.015">
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-view="tune"><i data-lucide="music"></i><span>Tune</span></button>
            <button class="nav-item" data-view="analyze"><i data-lucide="activity"></i><span>Analyze</span></button>
            <button class="nav-item" data-view="practice"><i data-lucide="mic-2"></i><span>Practice</span></button>
            <button class="nav-item" data-view="settings"><i data-lucide="settings"></i><span>Settings</span></button>
        </nav>
    </div>

    <div id="modal-permission" class="modal">
        <div class="modal-content">
            <div style="background: #0ea5e922; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i data-lucide="mic" style="color: #0ea5e9;"></i>
            </div>
            <h2>PitchPro Live</h2>
            <p>Ready to tune? Grant microphone access to start real-time detection.</p>
            <button id="start-app-btn" class="btn-primary">Initialize Engine</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
