<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PitchPro MVP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">
    <div id="app">
        <header>
            <div class="status-bar">
                <span id="connection-status">Mic Ready</span>
                <div class="controls">
                    <button id="freeze-btn" class="icon-btn"><i data-lucide="pause"></i></button>
                </div>
            </div>
        </header>

        <main id="view-container">
            <section id="view-tune" class="view active">
                <div class="pitch-display">
                    <div class="note-info">
                        <h1 id="note-name">--</h1>
                        <span id="note-octave"></span>
                    </div>
                    <div class="hz-display"><span id="frequency">0.0</span> Hz</div>
                </div>

                <div class="tuner-container">
                    <div class="tuner-scale">
                        <div class="marker-flat">-50</div>
                        <div class="center-line"></div>
                        <div class="marker-sharp">+50</div>
                    </div>
                    <div id="tuner-needle"></div>
                </div>
                <p class="label" style="text-align:center; color: #94a3b8; font-size: 0.7rem;">CENTS DEVIATION</p>
            </section>

            <section id="view-analyze" class="view">
                <div class="card">
                    <h3>Pitch History</h3>
                    <canvas id="history-canvas"></canvas>
                </div>
                <div class="card">
                    <h3>Input Waveform</h3>
                    <canvas id="waveform-canvas"></canvas>
                </div>
            </section>

            <section id="view-practice" class="view">
                <div class="card metronome-card">
                    <h3>Metronome</h3>
                    <div class="tempo-display" style="text-align: center; margin: 10px 0;">
                        <span id="bpm-value" style="font-size: 2rem; color: #38bdf8;">120</span> <small>BPM</small>
                    </div>
                    <input type="range" id="bpm-slider" min="40" max="220" value="120" style="width: 100%; margin-bottom: 15px;">
                    <button id="metro-toggle" class="btn-primary">Start Metronome</button>
                </div>
                <div class="card">
                    <h3>Vocal Range Test</h3>
                    <div class="range-stats" style="display: flex; justify-content: space-around; margin: 15px 0;">
                        <div style="text-align: center;">
                            <p class="label">LOW</p>
                            <span id="range-low" style="font-size: 1.5rem; font-weight: bold;">--</span>
                        </div>
                        <div style="text-align: center;">
                            <p class="label">HIGH</p>
                            <span id="range-high" style="font-size: 1.5rem; font-weight: bold;">--</span>
                        </div>
                    </div>
                    <button id="reset-range" class="btn-secondary" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: white;">Reset Range</button>
                </div>
            </section>

            <section id="view-settings" class="view">
                <div class="card">
                    <div class="settings-group">
                        <label>Notation System</label>
                        <select id="setting-notation">
                            <option value="english">C D E F G A B</option>
                            <option value="solfege">Do Re Mi Fa Sol La Si</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label>Reference Pitch (A4)</label>
                        <input type="number" id="setting-ref-pitch" value="440">
                    </div>
                    <div class="settings-group">
                        <label>Sensitivity Threshold</label>
                        <input type="range" id="setting-threshold" min="0.001" max="0.05" step="0.001" value="0.01">
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-view="tune"><i data-lucide="music"></i><span>Tune</span></button>
            <button class="nav-item" data-view="analyze"><i data-lucide="activity"></i><span>Analyze</span></button>
            <button class="nav-item" data-view="practice"><i data-lucide="mic-2"></i><span>Practice</span></button>
            <button class="nav-item" data-view="settings"><i data-lucide="settings"></i><span>Settings</span></button>
        </nav>
    </div>

    <div id="modal-permission" class="modal">
        <div class="modal-content" style="text-align: center; background: #1e293b; padding: 30px; border-radius: 20px; width: 80%;">
            <h2>Start PitchPro</h2>
            <p style="color: #94a3b8; margin-bottom: 20px;">Grant microphone access to begin tuning.</p>
            <button id="start-app-btn" class="btn-primary">Allow & Start</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
